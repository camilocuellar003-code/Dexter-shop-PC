<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Hardware - E-commerce</title>
    <link rel="stylesheet" href="PrideGamingPc.css">
</head>

<body>

    <header>
        <nav class="top-nav">
            <div class="logos-marcas">
                <img src="xpg-publicidad.jpg" alt="XPG" width="100">
                <img src="nzxt-publicidad.jpg" alt="NZXT" width="100">
                <img src="msi-publicidad.jpg" alt="MSI" width="100">
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Buscar productos...">
                <button onclick="searchProduct()"><i class="fas fa-search">🔍</i></button>
            </div>

            <div class="user-cart">
                <div class="user-icon">👤</div>
                <div class="cart-container" onclick="toggleCart()">
                    <span class="cart-icon">🛒</span>
                    <span id="cart-count">0</span>   
                </div>
            </div>
        </nav>

        <nav class="main-menu">
            <ul>
                <li><a href="index.html">INICIO</a></li>
                <li><a href="soporte.html">Soporte Técnico</a></li>
                <li><a href="Productos.html">PRODUCTOS</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div class="contenedor-centrado">
            <h2 class="section-title">PRODUCTOS DESTACADOS: PRIDE GAMING</h2>
        </div>
       
        <div class="product-grid">
            <div class="product-card">
                <img src="computadora-pride-gaming-nimbus.png" alt="PC NIMBUS" width="200">
                <div class="product-info">
                    <h3>Computadora PRIDE GAMING NIMBUS</h3>
                    <p class="specs">Computadora PRIDE GAMING NIMBUS / NZXT NO EDITION</p>
                    <p class="specs">RTX 5070 TI 16GB OC / INTEL CORE i7 14700K / 32GB RAM DDR5</p>
                    <p class="specs">2TB SSD M.2 PCIe Gen4 / 850W 80+ GOLD</p>
                    <p class="price">$49,999.00</p>
                    <button class="btn-buy" onclick="addToCart()">CON EXISTENCIA</button>
                </div>
            </div>

    </main>

    <script>
        let cartCount = 0;
        function addToCart() {
            cartCount++;
            document.getElementById('cart-count').innerText = cartCount;
            alert("Producto añadido al carrito");
        }

        function searchProduct() {
            let query = document.getElementById('searchInput').value;
            alert("Buscando: " + query);
        }

        function toggleCart() {
            alert("Tienes " + cartCount + " productos en tu carrito.");
        }
    </script>
</body>
</html>
